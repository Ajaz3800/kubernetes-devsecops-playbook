- name: setup Kubernetes cluster
  hosts: all
  become: true
  roles:
    - common
    - containerd
    - kubernetes
    

- name: initialize the Kubernetes cluster
  hosts: master
  become: true
  roles:
    - master

- name: Join worker nodes to the cluster
  hosts: worker
  become: true
  roles:
    - worker

- hosts: all
  become: true
  tasks:

    - name: Set node IP (auto detect)
      set_fact:
        node_ip: "{{ ansible_default_ipv4.address }}"

    - name: Override kubelet args
      copy:
        dest: /etc/default/kubelet
        content: |
          KUBELET_EXTRA_ARGS=--node-ip={{ node_ip }}

    - name: Restart kubelet
      systemd:
        name: kubelet
        daemon_reload: yes
        state: restarted